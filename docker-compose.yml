services:
  postgres:
    image: postgres:16-alpine
    container_name: cookpedia-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: cookpedia
      POSTGRES_PASSWORD: cookpedia
      POSTGRES_DB: cookpedia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cookpedia -d cookpedia']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
